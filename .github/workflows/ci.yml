name: 🐳 CI - Docker Build Check

on:
  push:
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  build-check:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build
