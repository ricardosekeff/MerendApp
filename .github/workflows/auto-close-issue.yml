name: ✅ Auto-close Issue on PR Merge

# Fecha automaticamente a issue referenciada pelo nome da branch
# quando um Pull Request é merged em develop ou main.
#
# Convenção de nomenclatura de branches:
#   feat/issue-{N}    → nova funcionalidade (enhancement)
#   bug/issue-{N}     → correção de bug
#   hotfix/issue-{N}  → hotfix em produção (parte da main)

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

jobs:
  close-issue:
    name: Close Referenced Issue
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Extract issue number from branch name and close issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            console.log(`Branch merged: ${branch}`);

            // Suporta padrões:
            //   feat/issue-5  |  bug/issue-5  |  hotfix/issue-5  |  issue-5
            const match = branch.match(/(?:(?:feat|bug|hotfix)\/)?issue-(\d+)/i);

            if (!match) {
              console.log('Nenhum número de issue encontrado no nome da branch. Pulando.');
              return;
            }

            const issueNumber = parseInt(match[1], 10);
            console.log(`Fechando issue #${issueNumber}...`);

            try {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`Issue #${issueNumber} fechada com sucesso! ✅`);

              // Adiciona comentário na issue informando o PR que a fechou
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ Issue concluída e fechada automaticamente via merge do PR #${context.payload.pull_request.number} ([${context.payload.pull_request.title}](${context.payload.pull_request.html_url})).`
              });
            } catch (error) {
              console.error(`Erro ao fechar issue #${issueNumber}: ${error.message}`);
              core.setFailed(error.message);
            }
