name: 🔒 Setup Branch Protection (Run Once)

# PRÉ-REQUISITO:
#   1. Gere um PAT (classic) em: https://github.com/settings/tokens
#      Escopos necessários: repo (full control)
#   2. Adicione como secret no repositório:
#      Settings → Secrets → Actions → New repository secret
#      Nome: REPO_ADMIN_TOKEN   Valor: <seu PAT>
#   3. Dispare este workflow manualmente uma única vez.

on:
  workflow_dispatch:

jobs:
  protect-main:
    name: Configure Branch Protection on main
    runs-on: ubuntu-latest

    steps:
      - name: Apply branch protection rules to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ADMIN_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false
            });
            console.log('✅ Branch protection configurada na main com sucesso!');
            console.log('  - Push direto: BLOQUEADO');
            console.log('  - Merge via PR: OBRIGATÓRIO (1 aprovação)');
