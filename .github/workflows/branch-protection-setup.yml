name: 🔒 Setup Branch Protection (Run Once)

# Este workflow configura a proteção da branch main automaticamente.
# Dispare-o manualmente uma única vez após a criação do repositório.
# Permissões necessárias: Settings > Actions > General > Allow GitHub Actions to create PRs
# e o token precisa ter permissão de admin no repositório.

on:
  workflow_dispatch:   # Disparo manual via GitHub Actions UI

jobs:
  protect-main:
    name: Configure Branch Protection on main
    runs-on: ubuntu-latest
    permissions:
      administration: write

    steps:
      - name: Apply branch protection rules to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_linear_history: false
            });
            console.log('✅ Branch protection configurada na main com sucesso!');
            console.log('Regras aplicadas:');
            console.log('  - Push direto bloqueado');
            console.log('  - Merge apenas via Pull Request');
            console.log('  - 1 aprovação necessária');
            console.log('  - Reviews stale são descartados após novos commits');
